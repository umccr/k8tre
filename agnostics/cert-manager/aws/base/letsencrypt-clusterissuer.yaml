apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ca
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: marko.malenic@umccr.org
    privateKeySecretRef:
      name: letsencrypt-ca
    solvers:
    - dns01:
        route53:
          region: ap-southeast-2
          role: arn:aws:iam::842385035780:role/cert-manager
          auth:
            kubernetes:
              serviceAccountRef:
                name: cert-manager
