apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-cnpg-pdb.yaml
  - path: patch-keycloak-env.yaml
    target:
      group: apps
      version: v1
      kind: StatefulSet
      name: keycloak-keycloakx

configMapGenerator:
  - name: keycloak-config
    literals:
      - ENVIRONMENT=${ENVIRONMENT}
      - DOMAIN=${DOMAIN}
  - name: keycloak-realm-config
    files:
      - realm.json=keycloak-realm-config.json

generatorOptions:
  disableNameSuffixHash: true
